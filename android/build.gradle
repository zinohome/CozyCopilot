# Placeholder build.gradle. The real Gradle module config is auto-
# generated by `npx cap add android`. On commit, only the source-
# controlled hand-written files are tracked; the auto-generated
# `gradle/`, `gradlew`, `gradlew.bat`, and `gradle-wrapper.jar` are
# not (and need to be regenerated on each clone with the steps
# described in android/README.md).
#
# After `npx cap add android`, this file will be replaced with a
# real Capacitor Android module config:
#
#   apply plugin: 'com.android.application'
#   android {
#     namespace "com.zinohome.cozycopilot"
#     compileSdk 35
#     defaultConfig {
#       applicationId "com.zinohome.cozycopilot"
#       minSdk 23
#       targetSdk 35
#       ...
#     }
#   }
